<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4080"/>
      <stop offset="100%" style="stop-color:#0d2550"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#9a7020"/>
    </linearGradient>
  </defs>

  <!-- White base -->
  <rect width="64" height="64" rx="8" fill="#ffffff"/>

  <!-- ── SHIELD SHAPE (matches logo exactly) ── -->
  <!-- Gold outer shield -->
  <path d="M32 2
           C32 2 58 10 58 10
           L58 34
           Q58 54 32 63
           Q6 54 6 34
           L6 10 Z"
        fill="url(#gold)"/>

  <!-- Navy inner shield -->
  <path d="M32 7
           C32 7 53 14 53 14
           L53 34
           Q53 50 32 58
           Q11 50 11 34
           L11 14 Z"
        fill="url(#navy)"/>

  <!-- ── DIAGONAL DIVIDER LINES (like logo) ── -->
  <line x1="11" y1="34" x2="53" y2="34" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
  <line x1="32" y1="14" x2="32" y2="58" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>

  <!-- ── TOP LEFT: Bar chart (growth) ── -->
  <rect x="14" y="22" width="3" height="8" rx="0.5" fill="#c9a84c"/>
  <rect x="18" y="19" width="3" height="11" rx="0.5" fill="#c9a84c"/>
  <rect x="22" y="16" width="3" height="14" rx="0.5" fill="#c9a84c"/>
  <!-- Arrow up -->
  <polyline points="14,21 20,15 26,18" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="26,15 26,20 22,17" fill="#c9a84c"/>

  <!-- ── TOP RIGHT: Building ── -->
  <rect x="36" y="17" width="12" height="14" rx="1" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <rect x="39" y="20" width="2.5" height="3" rx="0.3" fill="#c9a84c"/>
  <rect x="43" y="20" width="2.5" height="3" rx="0.3" fill="#c9a84c"/>
  <rect x="39" y="25" width="2.5" height="3" rx="0.3" fill="#c9a84c"/>
  <rect x="43" y="25" width="2.5" height="3" rx="0.3" fill="#c9a84c"/>

  <!-- ── CENTER: Rupee symbol (bold, large) ── -->
  <circle cx="32" cy="34" r="7" fill="none" stroke="#c9a84c" stroke-width="1.8"/>
  <text x="32" y="38.5"
        font-family="Arial, sans-serif"
        font-size="10"
        font-weight="900"
        fill="#c9a84c"
        text-anchor="middle">₹</text>

  <!-- ── BOTTOM LEFT: Exchange arrows ── -->
  <path d="M13 42 L24 42" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="24,40 24,44 27,42" fill="#c9a84c"/>
  <path d="M27 47 L16 47" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="16,45 16,49 13,47" fill="#c9a84c"/>

  <!-- ── BOTTOM RIGHT: Gear ── -->
  <circle cx="44" cy="46" r="4" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <circle cx="44" cy="46" r="1.5" fill="#c9a84c"/>
  <line x1="44" y1="41" x2="44" y2="43" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="49" x2="44" y2="51" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="46" x2="41" y2="46" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="46" x2="49" y2="46" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
</svg>
